            cat /tmp/enterprise-check.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

            if [ "$EXIT_CODE" -eq 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ Repository meets enterprise readiness criteria!" >> $GITHUB_STEP_SUMMARY
